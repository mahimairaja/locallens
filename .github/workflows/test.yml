name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:v1.14.0
        ports:
          - 6333:6333
          - 6334:6334

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Python tooling
        run: |
          pip install --upgrade pip maturin coverage
          pip install -r backend/requirements.txt

      - name: Build Rust extension + install package (editable, with test extras)
        run: maturin develop --release --extras test

      - name: Wait for Qdrant to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:6333/healthz && break
            echo "Waiting for Qdrant... ($i)"
            sleep 2
          done

      - name: Run tests (skip slow / Ollama-dependent)
        env:
          QDRANT_TEST_URL: http://localhost:6333
        run: |
          coverage run -m pytest tests/ -v --tb=short -m "not slow"
          coverage xml
          coverage report

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: mahimairaja/locallens
          fail_ci_if_error: false
