name: Continuous Integration

on:
  pull_request:
    paths:
      - 'locallens/**'
      - 'backend/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r backend/requirements.txt

      - name: Ruff check
        run: ruff check locallens/ backend/app/ tests/

      - name: Ruff format check
        run: ruff format --check locallens/ backend/app/ tests/

      - name: Mypy
        run: mypy locallens/ backend/app/
