name: Rust Wheels

on:
  push:
    branches: [main]
    paths:
      - 'rust/**'
      - '.github/workflows/rust-wheels.yml'
  pull_request:
    paths:
      - 'rust/**'
      - '.github/workflows/rust-wheels.yml'
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: rust

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: rust/dist/*.tar.gz

  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-14
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: windows-latest
            target: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: rust
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}
          path: rust/dist/*.whl

  publish:
    if: github.event_name == 'release'
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
