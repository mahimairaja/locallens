name: Build + publish wheels

# Builds a matrix of abi3 wheels (one per os/arch, covering Python 3.11-3.13)
# plus an sdist. Runs on manual dispatch, on PRs that touch the Rust crate or
# build config, and on GitHub releases — in which case the publish step
# uploads everything to PyPI via Trusted Publishing (OIDC).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'pyproject.toml'
      - '.github/workflows/wheels.yml'
  release:
    types: [published]

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install --upgrade pip maturin

      - name: Build sdist
        run: maturin sdist --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    name: Build wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel   # x86_64 (macos-13 deprecated)
          - macos-14         # arm64
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.21
        env:
          # abi3-py311 → one wheel per (os, arch) covers Python 3.11-3.13.
          CIBW_BUILD: "cp311-*"
          CIBW_SKIP: "*-musllinux_i686 *-win32 *-manylinux_i686"
          # Install maturin AND the Rust toolchain inside each cibw env.
          CIBW_BEFORE_ALL_LINUX: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable && source $HOME/.cargo/env && rustup target add x86_64-unknown-linux-gnu"
          CIBW_BEFORE_BUILD: "pip install maturin"
          CIBW_ENVIRONMENT_LINUX: "PATH=$HOME/.cargo/bin:$PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [sdist, wheels]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
