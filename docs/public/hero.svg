<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none">
  <!-- Warm radial glow -->
  <circle cx="160" cy="160" r="140" fill="url(#glow)" opacity="0.4"/>

  <!-- Central search lens -->
  <circle cx="140" cy="140" r="50" stroke="#C67B3C" stroke-width="4" fill="none" opacity="0.9"/>
  <line x1="178" y1="178" x2="210" y2="210" stroke="#C67B3C" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

  <!-- File icons orbiting -->
  <g opacity="0.6">
    <!-- PDF -->
    <rect x="60" y="60" width="28" height="34" rx="3" stroke="#C67B3C" stroke-width="1.5" fill="#FDF0E2"/>
    <text x="74" y="82" font-family="monospace" font-size="8" fill="#C67B3C" text-anchor="middle">.pdf</text>

    <!-- Python -->
    <rect x="232" y="80" width="28" height="34" rx="3" stroke="#78716C" stroke-width="1.5" fill="#F5F2EE"/>
    <text x="246" y="102" font-family="monospace" font-size="8" fill="#78716C" text-anchor="middle">.py</text>

    <!-- Markdown -->
    <rect x="220" y="200" width="28" height="34" rx="3" stroke="#78716C" stroke-width="1.5" fill="#F5F2EE"/>
    <text x="234" y="222" font-family="monospace" font-size="8" fill="#78716C" text-anchor="middle">.md</text>

    <!-- Docx -->
    <rect x="50" y="200" width="28" height="34" rx="3" stroke="#78716C" stroke-width="1.5" fill="#F5F2EE"/>
    <text x="64" y="222" font-family="monospace" font-size="8" fill="#78716C" text-anchor="middle">.doc</text>
  </g>

  <!-- Connection lines (files to lens) -->
  <g stroke="#E7E5E4" stroke-width="1" stroke-dasharray="4,4" opacity="0.5">
    <line x1="88" y1="77" x2="110" y2="120"/>
    <line x1="232" y1="97" x2="175" y2="130"/>
    <line x1="220" y1="217" x2="170" y2="170"/>
    <line x1="78" y1="217" x2="120" y2="165"/>
  </g>

  <!-- Vector dots inside lens -->
  <g fill="#C67B3C" opacity="0.5">
    <circle cx="125" cy="130" r="3"/>
    <circle cx="140" cy="120" r="2.5"/>
    <circle cx="155" cy="135" r="3"/>
    <circle cx="130" cy="150" r="2"/>
    <circle cx="150" cy="148" r="2.5"/>
    <circle cx="138" cy="140" r="2"/>
  </g>

  <!-- "100% offline" badge -->
  <rect x="95" y="260" width="130" height="24" rx="12" fill="#1C1917" opacity="0.85"/>
  <text x="160" y="276" font-family="monospace" font-size="10" fill="#FAFAF8" text-anchor="middle" letter-spacing="0.5">100% OFFLINE</text>

  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#C67B3C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C67B3C" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
