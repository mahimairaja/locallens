<svg viewBox="0 0 300 80" role="img" xmlns="http://www.w3.org/2000/svg">
<title>LocalLens</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
  text { font-family: 'Inter', sans-serif; }
  @media (prefers-color-scheme: dark) {
    .text-dark { fill: #e8e0d4; }
    .text-muted { fill: #9b9590; }
  }
  @media (prefers-color-scheme: light) {
    .text-dark { fill: #1c1917; }
    .text-muted { fill: #78716c; }
  }
</style>

<g transform="translate(10, 25)">
  <circle cx="16" cy="16" r="12" fill="none" stroke="#C67B3C" stroke-width="3"/>
  <line x1="24" y1="24" x2="32" y2="32" stroke="#C67B3C" stroke-width="3.5" stroke-linecap="round"/>
  <text x="44" y="16" font-size="28" font-weight="700" letter-spacing="-0.02em">
    <tspan fill="#C67B3C">Local</tspan><tspan class="text-dark">Lens</tspan>
  </text>
  <text x="44" y="34" font-size="11" font-weight="400" class="text-muted" letter-spacing="0.08em">SEARCH YOUR FILES BY VOICE</text>
</g>
</svg>
